<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NotebookLM Study Flow Settings</title>
    <style>
      body {
        margin: 0;
        padding: 32px;
        font: 15px/1.6 "Segoe UI", "PingFang SC", sans-serif;
        background: #f4f8f5;
        color: #15352d;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        background: #fff;
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 24px 64px rgba(13, 48, 40, 0.08);
      }

      h1 {
        margin-top: 0;
      }

      code {
        background: #edf6f0;
        padding: 2px 6px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>NotebookLM Study Flow</h1>
      <p>当前版本是 MVP，核心交互都在 NotebookLM 页面内的侧栏完成。</p>
      <p>已支持：</p>
      <ul>
        <li>对话导出为 <code>Markdown</code> / <code>JSON</code></li>
        <li>提示词模板保存与一键插入</li>
        <li>来源标签、状态与备注</li>
      </ul>
      <p>下一步适合补：</p>
      <ul>
        <li>更稳定的 DOM 识别器</li>
        <li>批量导出与结构化元数据</li>
        <li>模板导入导出</li>
      </ul>
    </main>
  </body>
  </html>
